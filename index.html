<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Insumos</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; }
    h1 { text-align:center; }
    .container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    label { font-weight:bold; display:block; margin-top:10px; }
    input { width:100%; padding:8px; margin-top:5px; }
    .postos label { display:block; font-weight:normal; }
    button { margin-top:15px; padding:10px; background:#007bff; color:#fff; border:none; border-radius:5px; }
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th,td { border:1px solid #ddd; padding:8px; text-align:center; }
    th { background:#007bff; color:#fff; }
  </style>
</head>
<body>

<div class="container">
  <h1>Controle envio de Insumos</h1>

  <label>Insumo</label>
  <input type="text" id="insumo">

  <label>Quantidade</label>
  <input type="number" id="quantidade">

  <label>Postos</label>
  <label>Postos</label>
  <details style="margin-top:5px;">
    <summary style="cursor:pointer; padding:8px; border:1px solid #ccc; border-radius:5px;">Selecionar postos</summary>
    <div id="postos" class="postos" style="margin-top:10px; max-height:200px; overflow:auto;">
      <label><input type="checkbox" value="Coité"> Coité</label>
      <label><input type="checkbox" value="Salgadalia"> Salgadalia</label>
      <label><input type="checkbox" value="Riachão"> Riachão</label>
      <label><input type="checkbox" value="Nova Fatima"> Nova Fatima</label>
      <label><input type="checkbox" value="Capela"> Capela</label>
      <label><input type="checkbox" value="Cliamo"> Cliamo</label>
      <label><input type="checkbox" value="Retirolandia"> Retirolandia</label>
      <label><input type="checkbox" value="Valente"> Valente</label>
      <label><input type="checkbox" value="CIS S. Luz"> CIS S. Luz</label>
      <label><input type="checkbox" value="M. Isabel S. Luz"> M. Isabel S. Luz</label>
      <label><input type="checkbox" value="Queimadas"> Queimadas</label>
      <label><input type="checkbox" value="Nossa Clínica"> Nossa Clínica</label>
      <label><input type="checkbox" value="Fisiomedic"> Fisiomedic</label>
      <label><input type="checkbox" value="Monte Santo"> Monte Santo</label>
    </div>
  </details>

  <label>Data</label>
  <input type="date" id="data">

  <button onclick="adicionar()">Salvar</button>

  <table>
    <thead>
      <tr>
        <th>Insumo</th>
        <th>Quantidade</th>
        <th>Posto</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>
let dados = [];

function renderizar() {
  const tbody = document.getElementById('tabela');
  tbody.innerHTML = '';

  dados.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td>${d.insumo}</td>
        <td>${d.quantidade}</td>
        <td>${d.posto}</td>
        <td>${d.data}</td>
      </tr>
    `;
  });
}

async function carregarDados() {
  const url = "https://sheetdb.io/api/v1/vinx1o8k4zxoi";

  try {
    const res = await fetch(url);
    const json = await res.json();

    dados = json;
    renderizar();

  } catch (erro) {
    console.error('Erro ao carregar dados:', erro);
  }
}

async function adicionar() {
  const insumo = document.getElementById('insumo').value;
  const quantidade = document.getElementById('quantidade').value;
  const data = document.getElementById('data').value;

  const checkboxes = document.querySelectorAll('#postos input:checked');
  const postosSelecionados = Array.from(checkboxes).map(cb => cb.value);

  if (!insumo || !quantidade || !data || postosSelecionados.length === 0) {
    alert('Preencha tudo');
    return;
  }

  const registros = postosSelecionados.map(posto => ({
    insumo,
    quantidade,
    posto,
    data
  }));

  const url = "https://sheetdb.io/api/v1/vinx1o8k4zxoi";

  try {
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data: registros })
    });

    alert('Salvo!');

    document.getElementById('insumo').value = '';
    document.getElementById('quantidade').value = '';
    document.getElementById('data').value = '';
    document.querySelectorAll('#postos input').forEach(cb => cb.checked = false);

    await carregarDados();

  } catch (erro) {
    console.error('Erro:', erro);
  }
}

carregarDados();
</script>

</body>
</html>
